# Welcome to Jekyll!
# Site settings

title: "My Web Project"
description: "A portfolio and blog built with GitHub Pages."
url: "https://bookowner.github.io" # Your production URL
baseurl: "" # Leave empty if your site is at the root, or use "/repository-name" if it's a project site

# User Info
author:
  name: "Bookowner"
  email: "luxeda4@gmail.com"
  twitter: "your_twitter_handle"

# Build settings
theme: minima # The default Jekyll theme supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude these files/folders from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
